# 로컬 풀 스택 전용: 단일 nginx. /api → backend, / → frontend (배포 시 Oracle2 엣지 + AWS API 분리)
# resolver: Docker 내장 DNS 사용. 컨테이너 재기동 시 IP 변경되어도 재해석되도록 valid=10s 적용.
# upstream은 변수로 지정해 Nginx가 기동 시점 IP를 캐시하지 않고 resolver로 주기적 재해석.
server {
    listen 80 default_server;
    server_name localhost _;
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    location /api {
        set $upstream_backend backend:8080;
        proxy_pass http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # 배치 Job 목록 등 (GET /batch/api/jobs) → Backend
    location /batch {
        set $upstream_backend backend:8080;
        proxy_pass http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location / {
        set $upstream_frontend frontend:80;
        proxy_pass http://$upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
