# 로컬 풀 스택: 배포 서버 3대(Osaka + Korea + AWS, Mumbai 제외)와 동일 구성
# Oracle1(데이터) + Oracle2(엣지) + AWS(API) 를 한 Compose로 통합.
# 단일 기동: ./scripts/local-up.sh 또는 docker compose -f docker-compose.local-full.yml up -d --build
# backend: investment-backend/.env 전체를 env_file로 전달, environment로 Docker용 DB/Redis 주소만 override
#
# 로그: 방법 A(json-file 로테이션) + 방법 B(backend는 호스트 볼륨에 영구 보관)
# - backend: logging max-file 10, ./logs/backend:/LOG → Spring Boot 파일 로그 max-history 10, 호스트에 남음 (down 해도 유지)
# - 그 외 서비스: logging json-file max-size 100m, max-file 5 (디스크 방지)
services:
  # === Oracle 1 (Osaka) 역할: 데이터 계층 ===
  timescaledb:
    image: timescale/timescaledb:2.13.0-pg16
    container_name: investment-timescaledb
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
      POSTGRES_USER: ${POSTGRES_USER:-local_pg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_pg_pass}
      POSTGRES_DB: ${POSTGRES_DB:-investment_portfolio}
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./docker/timescaledb/init:/docker-entrypoint-initdb.d
    networks:
      - investment-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-local_pg} -d ${POSTGRES_DB:-investment_portfolio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: investment-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - investment-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # === AWS (Seoul) 역할: API 계층 ===
  backend:
    build:
      context: ../investment-backend
      dockerfile: Dockerfile.local
    image: investment-backend:local
    pull_policy: never
    container_name: investment-backend
    # 실패 시에만 재시작, 횟수 제한은 entrypoint-retry.sh (기본 3회). 무제한 재시작 방지.
    restart: on-failure
    ports:
      - "8080:8080"
    volumes:
      # 방법 B: Spring Boot logging.file.name=/LOG/investment-choi.log → 호스트에 영구 보관 (down 해도 유지)
      - ./logs/backend:/LOG
    env_file:
      - ../investment-backend/.env
    environment:
      TZ: Asia/Seoul
      # 재시도 횟수(기본 3). 초과 시 컨테이너는 더 이상 재시작하지 않음.
      RESTART_MAX_ATTEMPTS: "${RESTART_MAX_ATTEMPTS:-3}"
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://timescaledb:5432/${POSTGRES_DB:-investment_portfolio}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-local_pg}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-local_pg_pass}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      # POST /api/v1/news/collect 가 Python 수집기(data-collector)를 호출하도록 설정. 미설정 시 503 반환.
      US_COLLECTOR_URL: "http://data-collector:8001"
      # AI 예측 서비스(헬스/예측 API). 미설정 시 localhost:8000으로 실패하므로 Docker 호스트명 지정.
      AI_PREDICTION_SERVICE_URL: "http://prediction-service:8000"
      # data-collector가 POST /api/v1/internal/collected-news 호출 시 X-Internal-Data-Key 와 일치해야 함. data-collector와 동일 값.
      DATA_COLLECTION_INTERNAL_KEY: ${DATA_COLLECTION_INTERNAL_KEY:-local-internal-key}
    networks:
      - investment-network
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "900m"
        max-file: "30"

  prediction-service:
    build:
      context: ../investment-prediction-service
      dockerfile: Dockerfile
    image: investment-prediction-service:local
    pull_policy: never
    container_name: investment-prediction-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../investment-backend/.env
    environment:
      TZ: Asia/Seoul
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    networks:
      - investment-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  data-collector:
    build:
      context: ../investment-data-collector
      dockerfile: Dockerfile
    image: investment-data-collector:local
    pull_policy: never
    container_name: investment-data-collector
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ../investment-backend/.env
    environment:
      TZ: Asia/Seoul
      # 수집기가 Spring 호출 시 사용. Docker 내부 호스트명 (env_file의 localhost 덮어씀)
      SPRING_BASE_URL: "http://backend:8080"
      # 인프라 .env로 덮어쓰기 가능. 미설정 시 env_file(backend .env) 값 사용
      DATA_COLLECTION_INTERNAL_KEY: ${DATA_COLLECTION_INTERNAL_KEY:-local-internal-key}
      # DART_API_KEY, SEC_API_KEY 등은 env_file(backend .env)에서 로드됨
    networks:
      - investment-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # === Oracle 2 (Korea) 역할: 엣지(프론트 + nginx) ===
  frontend:
    build:
      context: ../investment-frontend
      dockerfile: Dockerfile
    image: investment-frontend:local
    pull_policy: never
    container_name: investment-frontend
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
    networks:
      - investment-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # 로컬 단일 nginx: /api → backend:8080, / → frontend:80 (conf.d.local)
  nginx:
    image: nginx:alpine
    container_name: investment-nginx-local
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d.local:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend
    networks:
      - investment-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  timescaledb_data:
    driver: local
  redis_data:
    driver: local

networks:
  investment-network:
    driver: bridge
